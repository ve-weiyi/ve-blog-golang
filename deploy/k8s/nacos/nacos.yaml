# 1. 密钥配置（包含认证+MySQL敏感信息）
apiVersion: v1
kind: Secret
metadata:
  name: nacos-secret
type: Opaque
stringData:
  # Nacos认证密钥（3.x 兼容2.x配置）
  auth-identity-key: "serverIdentity"
  auth-identity-value: "security"
  auth-token: "SecretKey012345678901234567890123456789012345678901234567890123456789"
  # MySQL连接配置（3.x 对MySQL 8.0兼容性更好，补充关键参数）
  mysql-url: "jdbc:mysql://mysql:3306/nacos?charset=utf8mb4&parseTime=True&loc=Local&useSSL=false&allowPublicKeyRetrieval=true"
  mysql-username: "root"
  mysql-password: "mysql7914"

---
# 2. 数据目录PVC（3.x 存储占用更低，5Gi满足需求）
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nacos-pvc
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
# 3. Service（3.x 端口配置，8080为控制台、8848为API）
apiVersion: v1
kind: Service
metadata:
  name: nacos
spec:
  type: ClusterIP
  selector:
    app: nacos
  ports:
    - name: http-api
      port: 8848
      targetPort: 8848
    - name: console
      port: 8080
      targetPort: 8080
    - name: client-rpc
      port: 9848
      targetPort: 9848
    - name: raft-rpc
      port: 9849
      targetPort: 9849

---
# 4. StatefulSet（核心：3.1.1版本 + 轻量化配置 + JVM优化）
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nacos
spec:
  serviceName: nacos
  replicas: 1
  selector:
    matchLabels:
      app: nacos
  template:
    metadata:
      labels:
        app: nacos
    spec:
      containers:
        - name: nacos
          image: nacos/nacos-server:v3.1.1
          # 3.x 轻量化资源配置（匹配JVM实际需求）
          resources:
            requests:
              memory: "512Mi"  # 上调requests，匹配JVM堆+堆外内存需求
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "800m"
          # 3.x 端口暴露：8080控制台、8848API、9848/9849RPC
          ports:
            - containerPort: 8080
              hostPort: 8849
              name: console
            - containerPort: 8848
              hostPort: 8848
              name: http-api
            - containerPort: 9848
              hostPort: 9848
              name: client-rpc
            - containerPort: 9849
              name: raft-rpc
          # 环境变量配置（适配3.x核心特性 + JVM优化）
          env:
            - name: PREFER_HOST_MODE
              value: "hostname"
            - name: MODE
              value: "standalone"
            # Nacos认证配置（3.x 兼容2.x鉴权逻辑）
            - name: NACOS_AUTH_IDENTITY_KEY
              valueFrom:
                secretKeyRef:
                  name: nacos-secret
                  key: auth-identity-key
            - name: NACOS_AUTH_IDENTITY_VALUE
              valueFrom:
                secretKeyRef:
                  name: nacos-secret
                  key: auth-identity-value
            - name: NACOS_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nacos-secret
                  key: auth-token
            - name: NACOS_AUTH_ENABLE
              value: "true"
            # MySQL数据源配置（补充MySQL 8.0兼容参数）
            - name: SPRING_DATASOURCE_PLATFORM
              value: "mysql"
            - name: DB_URL_0
              valueFrom:
                secretKeyRef:
                  name: nacos-secret
                  key: mysql-url
            - name: DB_USER_0
              valueFrom:
                secretKeyRef:
                  name: nacos-secret
                  key: mysql-username
            - name: DB_PASSWORD_0
              valueFrom:
                secretKeyRef:
                  name: nacos-secret
                  key: mysql-password
            # JVM配置（3.x 基于JDK17优化，限制堆外内存）
            - name: JVM_XMS
              value: "256m"
            - name: JVM_XMX
              value: "256m"
            - name: JVM_XMN
              value: "128m"
            # 关键优化：限制堆外内存（解决实际内存偏高问题）
            - name: JVM_OPTS
              value: "-XX:MaxDirectMemorySize=128m -XX:MetaspaceSize=64m -XX:MaxMetaspaceSize=128m -XX:+UseG1GC -XX:+ExplicitGCInvokesConcurrent"
            # 3.x 新增：强制使用JDK17（镜像内置）
            - name: JAVA_HOME
              value: "/usr/local/openjdk-17"
          # 存储挂载：限制日志目录大小，避免磁盘占满
          volumeMounts:
            - name: data
              mountPath: /home/nacos/data
            - name: logs
              mountPath: /home/nacos/logs
      # 挂载PVC：新增日志目录大小限制
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nacos-pvc
        - name: logs
          emptyDir:
            sizeLimit: 500Mi  # 限制日志目录最大500Mi
